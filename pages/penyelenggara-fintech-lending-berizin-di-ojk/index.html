         <script>
            const dataUrl = 'https://raw.githubusercontent.com/jeannesbond/penyelenggara-fintech-lending-berizin-di-ojk/main/data.json';

            function updateRowNumbers() {
               let count = 0;
               $('#table-body tr').each(function(index) {
                  if ($(this).is(':visible')) {
                        count++;
                        $(this).find('td:first').text(count);
                  }
               });
            }
    
            // Fetch data from the external JSON source
            async function fetchData() {
                try {
                    const response = await fetch(dataUrl);
                    const jsonData = await response.json();
    
                    // Render table rows based on fetched data
                    const $tableBody = $('#table-body');
                    $tableBody.empty(); // Clear existing rows
    
                    jsonData.forEach((item, index) => {
                        const row = `
                            <tr>
                                <td class="text-center" style="color: #00ff2b;">${index + 1}</td>
                                <td style="color: #00ff2b;">${item.name}</td>
                                <td><a href="${item.website}" class="text-decoration-none" style="color: #00ff2b;">${item.website}</a></td>
                            </tr>
                        `;
                        $tableBody.append(row);
                    });
    
                    updateRowNumbers();
                } catch (error) {
                    console.error('Error fetching data:', error);
                }
            }
    
            // Handle user input
            $('#search').keyup(function() {
                const val = $.trim($(this).val()).toLowerCase();
                const $rows = $('#table-body tr');
    
                $rows.show().filter(function() {
                    const text = $(this).find('td:nth-child(2)').text().toLowerCase();
                    return text.indexOf(val) === -1;
                }).hide();
    
                $('#no-results').toggle($rows.filter(':visible').length === 0);
                updateRowNumbers();
            });
    
            // Initial fetching and rendering
            fetchData();
        </script>
